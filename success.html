<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — Thank You</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page-outer page-outer--centered">
    <div class="page-inner">

      <!-- Logo -->
      <header class="site-header" style="margin-bottom: 0;">
        <img
          src="logo.png.PNG"
          alt="Relay"
          class="logo"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block';"
        />
        <span class="logo-fallback" style="display:none;">Relay</span>
      </header>

      <!-- Success card -->
      <main style="display:flex; justify-content:center; padding: 48px 0 0;">
        <div class="success-card">

          <div class="success-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 10.5L8.5 15L16 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <h1 class="success-title">Thanks — your feedback<br>helps shape Relay</h1>
          <p class="success-sub">We've received your response.</p>

          <a href="index.html" class="btn-back">← Back</a>

        </div>
      </main>

      <!-- Footer -->
      <footer class="site-footer">
        <span>&copy; 2025 Relay Technologies, Inc.</span>
        <span class="dot">&middot;</span>
        <a href="#">Privacy</a>
        <span class="dot">&middot;</span>
        <a href="#">Terms</a>
      </footer>

    </div>
  </div>

</body>
</html>
