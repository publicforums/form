<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — Thank You</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="success-page">

  <div class="shell shell--centered">

    <!-- Logo -->
    <header class="header">
      <img
        src="logo.png.PNG"
        alt="Relay"
        class="logo"
        onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block';"
      />
      <span class="logo-fallback" style="display:none; font-weight:600; font-size:18px; letter-spacing:-0.3px;">Relay</span>
    </header>

    <!-- Success card -->
    <main class="main">
      <div class="success-card">

        <div class="success-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.5 11.5L9 16L17.5 6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <h1 class="success-title">Thanks — your feedback<br>helps shape Relay</h1>
        <p class="success-sub">We've received your response.</p>

        <a href="index.html" class="back-btn">Back</a>

      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>&copy; 2025 Relay Technologies, Inc.</span>
      <span class="dot">&middot;</span>
      <a href="#">Privacy</a>
      <span class="dot">&middot;</span>
      <a href="#">Terms</a>
    </footer>

  </div>

</body>
</html>
