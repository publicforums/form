<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — Share Your Feedback</title>
  <meta name="description" content="Your feedback builds the next generation chat experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page">

    <!-- Logo -->
    <header class="site-header">
      <img src="logo.png" alt="Relay" class="logo" />
    </header>

    <!-- Hero -->
    <section class="hero">
      <h1 class="hero-title">Help shape Relay</h1>
      <p class="hero-subtitle">Your feedback builds the next generation chat&nbsp;experience.</p>
    </section>

    <!-- Survey Form -->
    <main class="content">
      <form
        id="relay-form"
        action="https://formspree.io/f/xaqagppb"
        method="POST"
        novalidate
      >
        <!-- Hidden Formspree fields -->
        <input type="hidden" name="_subject" value="Relay Feedback Submission" />

        <!-- Q1 -->
        <div class="field" id="field-q1">
          <label class="label" for="q1_problem">
            <span class="label-num" aria-hidden="true">01</span>
            What problems do you have with your current messaging or chatting apps?
          </label>
          <textarea
            class="input"
            id="q1_problem"
            name="q1_problem"
            placeholder="Too cluttered, poor search, notification overload, missing threads…"
            rows="5"
            required
          ></textarea>
          <p class="err-msg" id="err-q1" role="alert" aria-live="polite"></p>
        </div>

        <!-- Q2 -->
        <div class="field" id="field-q2">
          <label class="label" for="q2_features">
            <span class="label-num" aria-hidden="true">02</span>
            What features or experiences would make a new chat app worth trying?
          </label>
          <textarea
            class="input"
            id="q2_features"
            name="q2_features"
            placeholder="Smarter notifications, AI summaries, better file sharing, clean design…"
            rows="5"
            required
          ></textarea>
          <p class="err-msg" id="err-q2" role="alert" aria-live="polite"></p>
        </div>

        <!-- Q3 -->
        <div class="field" id="field-q3">
          <label class="label" for="q3_switch">
            <span class="label-num" aria-hidden="true">03</span>
            How important is switching to a new chat app, and what would trigger it?
          </label>
          <textarea
            class="input"
            id="q3_switch"
            name="q3_switch"
            placeholder="A must-have feature, a pricing change, a privacy concern…"
            rows="5"
            required
          ></textarea>
          <p class="err-msg" id="err-q3" role="alert" aria-live="polite"></p>
        </div>

        <!-- Submit -->
        <div class="submit-row">
          <button type="submit" id="submit-btn" class="submit-btn">
            <span class="btn-label">Send Feedback</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
          <p class="submit-caption">Anonymous &middot; Takes about 3 minutes</p>
        </div>

      </form>

      <!-- Success state (replaces form) -->
      <div class="success" id="success-panel" hidden>
        <div class="success-check" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10.5L8.5 15L16 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="success-heading">Thank you for your feedback</h2>
        <p class="success-body">We read every response as we build Relay.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <p>
        &copy; 2025 Relay Technologies, Inc.
        <span class="sep">&middot;</span>
        <a href="#">Privacy</a>
        <span class="sep">&middot;</span>
        <a href="#">Terms</a>
      </p>
    </footer>

  </div><!-- /.page -->

  <script src="main.js"></script>
</body>
</html>
