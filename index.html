<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relay Startup Validation Survey</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --secondary-color: #E5E5EA;
            --background-color: #FFFFFF;
            --text-color: #000000;
            --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.3s;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 400px;
        }
        textarea {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid var(--primary-color);
            border-radius: 5px;
            font-size: 1rem;
        }
        button {
            padding: 10px;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: darken(var(--primary-color), 10%);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Logo" style="width: 100px; margin-bottom: 20px;">
    <h1>Relay Startup Validation Survey</h1>
    <form id="survey-form">
        <textarea id="question1" placeholder="Question 1: What is your main concern with Relay?" required></textarea>
        <textarea id="question2" placeholder="Question 2: How likely are you to use Relay?" required></textarea>
        <textarea id="question3" placeholder="Question 3: Any additional comments?" required></textarea>
        <button type="submit">Submit</button>
    </form>
    <div class="modal" id="response-modal">
        <div class="modal-content">
            <h2>Your Responses</h2>
            <p id="responses"></p>
            <button onclick="toggleModal()">Close</button>
        </div>
    </div>
    <script>
        const form = document.getElementById('survey-form');
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const responses = {
                question1: document.getElementById('question1').value,
                question2: document.getElementById('question2').value,
                question3: document.getElementById('question3').value
            };
            localStorage.setItem('surveyResponses', JSON.stringify(responses));
            alert('Responses saved!');
            form.reset();
        });

        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.shiftKey && event.key === 'L') {
                toggleModal();
            }
        });

        function toggleModal() {
            const modal = document.getElementById('response-modal');
            const responsesDisplay = document.getElementById('responses');
            if (modal.style.display === 'none' || modal.style.display === '') {
                const savedResponses = JSON.parse(localStorage.getItem('surveyResponses')) || {};
                responsesDisplay.innerHTML = `<strong>Question 1:</strong> ${savedResponses.question1 || 'No response'}<br/>` +
                                           `<strong>Question 2:</strong> ${savedResponses.question2 || 'No response'}<br/>` +
                                           `<strong>Question 3:</strong> ${savedResponses.question3 || 'No response'}<br/>`;
                modal.style.display = 'flex';
            } else {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
